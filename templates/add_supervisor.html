{% extends 'base.html' %}
{% block title %}Add Supervisor — ShramSetu{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-8">
        <div style="border-radius:20px; border:1px solid var(--border); background:var(--card-bg); overflow:hidden;">
            <div style="padding:1.75rem 2rem; background:linear-gradient(135deg, var(--sky) 0%, #124e73 100%); position:relative; overflow:hidden;">
                <div style="position:absolute; right:-30px; top:-30px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.08);"></div>
                <div style="display:flex; align-items:center; gap:14px; position:relative;">
                    <div style="width:48px; height:48px; border-radius:14px; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:1.3rem; color:white;">
                        <i class="fa-solid fa-user-tie"></i>
                    </div>
                    <div>
                        <h3 style="font-family:'Syne',sans-serif; font-weight:800; color:white; margin:0; font-size:1.2rem;">New Supervisor</h3>
                        <p style="color:rgba(255,255,255,0.8); font-size:0.83rem; margin:0;">Create credentials for a site manager</p>
                    </div>
                </div>
            </div>
            <div style="padding:2rem;">
                <form method="POST" action="/add_supervisor">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Ravi Sharma" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Username / Email</label>
                        <input type="text" name="username" class="form-control" placeholder="ravi_sup or ravi@shram.com" required>
                        <div class="form-text">Supervisor will use this to log in.</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Temporary Password</label>
                        <input type="text" name="password" class="form-control" placeholder="Create a secure password" required>
                    </div>
                    <button type="submit" class="btn w-100 btn-lg" style="background:var(--sky); color:white; border:none;">
                        <i class="fa-solid fa-user-plus me-2"></i>Create Account
                    </button>
                </form>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="/" style="text-decoration:none; color:var(--text-muted); font-size:0.83rem;">
                <i class="fa-solid fa-arrow-left me-1"></i>Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}

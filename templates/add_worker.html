{% extends 'base.html' %}
{% block title %}Add Worker — ShramSetu{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-8">
        <div style="border-radius:20px; border:1px solid var(--border); background:var(--card-bg); overflow:hidden;">
            <div style="padding:1.75rem 2rem; background:linear-gradient(135deg, var(--saffron) 0%, #c45e1a 100%); position:relative; overflow:hidden;">
                <div style="position:absolute; right:-30px; top:-30px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,0.08);"></div>
                <div style="display:flex; align-items:center; gap:14px; position:relative;">
                    <div style="width:48px; height:48px; border-radius:14px; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:1.3rem; color:white;">
                        <i class="fa-solid fa-helmet-safety"></i>
                    </div>
                    <div>
                        <h3 style="font-family:'Syne',sans-serif; font-weight:800; color:white; margin:0; font-size:1.2rem;">Register Worker</h3>
                        <p style="color:rgba(255,255,255,0.8); font-size:0.83rem; margin:0;">Enter details to add to the system</p>
                    </div>
                </div>
            </div>
            <div style="padding:2rem;">
                <form method="POST" action="/add_worker">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Ramesh Kumar" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text">+91</span>
                            <input type="text" name="phone" class="form-control" placeholder="9876543210" pattern="[0-9]{10}">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label">Skill Level</label>
                            <select name="worker_type" class="form-select">
                                <option value="Unskilled">Unskilled (1.5× OT)</option>
                                <option value="Skilled">Skilled (2.0× OT)</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Hourly Rate (₹)</label>
                            <div class="input-group">
                                <span class="input-group-text">₹</span>
                                <input type="number" step="0.01" name="rate" class="form-control" placeholder="100" required>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg mt-2">
                        <i class="fa-solid fa-user-plus me-2"></i>Register Worker
                    </button>
                </form>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="/" style="text-decoration:none; color:var(--text-muted); font-size:0.83rem;">
                <i class="fa-solid fa-arrow-left me-1"></i>Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
